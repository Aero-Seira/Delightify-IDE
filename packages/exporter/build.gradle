plugins {
    id 'java'
    // ModDevGradle —— NeoForge 官方 Gradle 插件（取代 ForgeGradle/NeoGradle）
    id 'net.neoforged.moddev' version "${moddev_version}"
}

version = mod_version
group = mod_group

java {
    toolchain.languageVersion = JavaLanguageVersion.of(21)
}

repositories {
    mavenCentral()
    maven { url = 'https://maven.neoforged.net/releases' }
}

neoForge {
    version = neo_version

    // Parchment 参数名映射可选；默认 Mojmap 已够用，先不启用以免锁错版本。
    // parchment { ... }

    runs {
        client {
            client()
            // 完整导出（含贴图/配方视图）走客户端（集成服务端）环境
            systemProperty 'forge.logging.console.level', 'info'
        }
        server {
            server()
            programArgument '--nogui'
        }
    }

    mods {
        "${mod_id}" {
            sourceSet sourceSets.main
        }
    }
}

dependencies {
    // SQLite JDBC —— 通过 jarJar 打进 mod jar（NeoForge jar-in-jar），
    // 否则模块化类加载器看不到 JDBC 驱动（见 SqliteDatabase 的多 ClassLoader 兜底）。
    implementation "org.xerial:sqlite-jdbc:${sqlite_jdbc_version}"
    jarJar("org.xerial:sqlite-jdbc") {
        version { strictly "[3.50,4.0)"; prefer "${sqlite_jdbc_version}" }
    }
}

// 把 gradle.properties 的元信息注入 neoforge.mods.toml
var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
        minecraft_version: minecraft_version,
        neo_version      : neo_version,
        neo_min_version  : neo_min_version,
        mod_id           : mod_id,
        mod_name         : mod_name,
        mod_version      : mod_version,
        mod_license      : mod_license,
        mod_authors      : mod_authors,
        mod_description  : mod_description,
    ]
    inputs.properties replaceProperties
    filteringCharset = 'UTF-8'
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}
sourceSets.main.resources.srcDir generateModMetadata
neoForge.ideSyncTask generateModMetadata

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 21
}
